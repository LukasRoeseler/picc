name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site with secret injected
        env:
          SHEET_WEBHOOK_URL: ${{ secrets.SHEET_WEBHOOK_URL }}
        run: |
          mkdir -p _site
          cp index.html sheet-logger.gs.js LICENSE README.md _site/
          sed -i "s|__SHEET_WEBHOOK_URL__|${SHEET_WEBHOOK_URL}|g" _site/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
